# Multi-media-server integration test stack.
#
# Brings up Emby, Jellyfin, and Plex against a shared synthetic media
# library so the dispatcher's path-centric fan-out can be exercised
# end-to-end. Plex requires a one-time PLEX_CLAIM token from
# https://plex.tv/claim — Emby and Jellyfin are configured fully via API.
#
# Usage (from repo root):
#   ./tests/integration/generate_test_media.sh           # creates synthetic mkv files
#   PLEX_CLAIM=claim-XXXXXXXX docker compose -f tests/integration/docker-compose.test.yml up -d
#   python tests/integration/setup_servers.py            # API-configures users + libraries
#   pytest -m integration --no-cov tests/integration/    # runs the e2e scenarios
#   docker compose -f tests/integration/docker-compose.test.yml down -v
#
# All three servers see the same files, but each at a different mount
# path — that exercises per-server path_mappings end-to-end.

name: plex-previews-test

services:
  emby:
    image: emby/embyserver:latest
    container_name: previews-test-emby
    environment:
      UID: "1000"
      GID: "1000"
      GIDLIST: "1000"
    ports:
      - "127.0.0.1:8096:8096"   # Emby API + UI
    volumes:
      - emby_config:/config
      - ./media:/em-media:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8096/System/Info/Public >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  jellyfin:
    # 10.11.x — required by the off-media trickplay integration test (the
    # Media Preview Bridge plugin floor is 10.11). setup_servers.py bootstraps
    # an admin API key by injecting into the SQLite DB (the first-run wizard's
    # /Startup/User is broken across 10.9-10.11); on linuxserver images the DB
    # lives at <config>/data/data/jellyfin.db. The config dir is a BIND mount
    # (not a named volume) so the publisher can write off-media trickplay into
    # Jellyfin's data folder and so setup can drop the plugin in. PUID/PGID
    # default to the invoking user (up.sh / CI export $(id -u)/$(id -g)) so the
    # bind dir is writable by the test process.
    image: lscr.io/linuxserver/jellyfin:10.11.0
    container_name: previews-test-jellyfin
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: UTC
      JELLYFIN_PublishedServerUrl: "http://127.0.0.1:8097"
    ports:
      - "127.0.0.1:8097:8096"   # Jellyfin API + UI (host port shifted to avoid collision)
    volumes:
      - ./jellyfin-config:/config
      - jellyfin_cache:/cache
      - ./media:/jf-media:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8096/System/Info/Public >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  plex:
    image: plexinc/pms-docker:latest
    container_name: previews-test-plex
    environment:
      TZ: UTC
      PLEX_CLAIM: ${PLEX_CLAIM:-}    # one-time, from https://plex.tv/claim
      ADVERTISE_IP: "http://127.0.0.1:32401"
    ports:
      - "127.0.0.1:32401:32400"      # host port shifted so the user's prod Plex (32400) is untouched
    volumes:
      - plex_config:/config
      - plex_transcode:/transcode
      - ./media:/media:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:32400/identity >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60   # Plex first-run takes longer than Emby/Jellyfin

volumes:
  emby_config:
  jellyfin_cache:
  plex_config:
  plex_transcode:
